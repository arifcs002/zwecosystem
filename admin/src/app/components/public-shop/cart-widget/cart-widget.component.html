<!-- Cart icon button (place inside a navbar) -->
<button (click)="cartService.toggleCart()" class="relative p-2.5 text-gray-600 hover:text-indigo-600 transition rounded-xl hover:bg-indigo-50">
  <svg class="w-5.5 h-5.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
  </svg>
  <span *ngIf="cartService.cartTotalItems > 0" class="absolute top-1 right-1 w-4.5 h-4.5 bg-rose-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center shadow-sm">{{ cartService.cartTotalItems }}</span>
</button>

<!-- ══ CART SIDEBAR ══ -->
<div *ngIf="cartService.isCartOpen" class="fixed inset-0 z-50 flex justify-end">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" (click)="cartService.toggleCart()"></div>
  <div class="relative w-full max-w-sm bg-white shadow-2xl flex flex-col h-full">
    <div class="flex items-center justify-between px-5 py-4 border-b">
      <h2 class="font-bold text-gray-900">Cart ({{ cartService.cartTotalItems }})</h2>
      <button (click)="cartService.toggleCart()" class="text-gray-400 hover:text-gray-700 w-7 h-7 flex items-center justify-center rounded-lg hover:bg-gray-50 transition">✕</button>
    </div>
    <div class="flex-1 overflow-y-auto px-5 py-3 space-y-3">
      <div *ngIf="cartService.cart.length === 0" class="flex flex-col items-center justify-center py-16 text-gray-400">
        <span class="text-4xl mb-3">🛒</span>
        <p class="text-sm">Your cart is empty.</p>
      </div>
      <div *ngFor="let item of cartService.cart" class="flex items-center gap-3">
        <img *ngIf="item.product.image" [src]="item.product.image" class="w-12 h-12 rounded-lg object-cover border border-gray-100" alt="">
        <div *ngIf="!item.product.image" class="w-12 h-12 rounded-lg bg-gray-100 flex items-center justify-center text-xl">📦</div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-semibold text-gray-800 truncate">{{ item.product.name }}<span *ngIf="item.product.size" class="text-gray-400 font-normal"> · {{ item.product.size }}</span></p>
          <p class="text-xs text-gray-500">৳{{ item.product.price | number:'1.0-0' }}</p>
        </div>
        <div class="flex items-center gap-1">
          <button (click)="cartService.updateQuantity(item, -1)" class="w-6 h-6 rounded border border-gray-200 text-sm flex items-center justify-center hover:bg-gray-50">−</button>
          <span class="w-5 text-center text-sm font-semibold">{{ item.quantity }}</span>
          <button (click)="cartService.updateQuantity(item, 1)" class="w-6 h-6 rounded border border-gray-200 text-sm flex items-center justify-center hover:bg-gray-50">+</button>
        </div>
      </div>
    </div>
    <div class="px-5 py-4 border-t">
      <div class="flex justify-between text-sm font-bold mb-3">
        <span>Total</span><span>৳{{ cartService.cartSubtotal | number:'1.0-0' }}</span>
      </div>
      <button (click)="goToCheckout()" [disabled]="cartService.cart.length === 0"
        class="w-full py-2.5 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 transition disabled:opacity-40 text-sm">
        Checkout →
      </button>
    </div>
  </div>
</div>
