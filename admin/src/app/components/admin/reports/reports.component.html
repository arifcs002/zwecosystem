<div class="bg-white p-6 rounded-lg shadow-md">
  <div class="flex justify-between items-center mb-6 border-b pb-4">
    <h3 class="text-2xl font-bold text-gray-800">Sales Reports & Receipts</h3>
    <div class="flex space-x-2">
      <input type="date" class="border rounded p-2 text-sm text-gray-600">
      <button class="bg-gray-800 text-white px-4 py-2 rounded shadow hover:bg-gray-900 transition">Filter</button>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
    <div class="border rounded p-4 text-center">
      <h4 class="text-gray-500 font-semibold mb-2">Today's Revenue</h4>
      <p class="text-2xl font-bold text-green-600">৳ 12,500</p>
    </div>
    <div class="border rounded p-4 text-center">
      <h4 class="text-gray-500 font-semibold mb-2">Items Sold Today</h4>
      <p class="text-2xl font-bold text-blue-600">18</p>
    </div>
  </div>

  <h4 class="font-bold text-gray-700 mb-2 border-b pb-2">Recent Transactions</h4>
  <table class="w-full text-left border-collapse text-sm">
    <thead>
      <tr class="bg-gray-50 text-gray-600 uppercase">
        <th class="p-3">Receipt No</th>
        <th class="p-3">Time</th>
        <th class="p-3">Amount</th>
        <th class="p-3 text-right">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr class="border-b">
        <td class="p-3">#RCPT-1001</td>
        <td class="p-3 text-gray-500">10:45 AM</td>
        <td class="p-3 font-semibold text-green-600">৳ 2,500</td>
        <td class="p-3 text-right">
          <button class="text-blue-500 hover:text-blue-700 text-xs uppercase font-bold tracking-wide border border-blue-500 px-2 py-1 rounded">Print Receipt</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
