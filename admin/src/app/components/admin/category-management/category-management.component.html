<div class="bg-white p-6 rounded-lg shadow-md max-w-4xl">
  <div class="flex justify-between items-center mb-6">
    <h3 class="text-2xl font-bold text-gray-800">Categories</h3>
    <button class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700 transition">
      + New Category
    </button>
  </div>

  <table class="w-full text-left border-collapse">
    <thead>
      <tr class="bg-gray-100 text-gray-700 uppercase text-sm border-b">
        <th class="p-3">Category Name</th>
        <th class="p-3">Parent</th>
        <th class="p-3">Item Count</th>
        <th class="p-3 text-right">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr class="border-b hover:bg-gray-50">
        <td class="p-3 font-semibold">Sneakers</td>
        <td class="p-3 text-gray-500">Shoes</td>
        <td class="p-3">12</td>
        <td class="p-3 text-right">
          <button class="text-blue-500 hover:text-blue-700 mr-2">Edit</button>
          <button class="text-red-500 hover:text-red-700">Delete</button>
        </td>
      </tr>
      <tr class="border-b hover:bg-gray-50">
        <td class="p-3 font-semibold">T-Shirts</td>
        <td class="p-3 text-gray-500">Clothing</td>
        <td class="p-3">45</td>
        <td class="p-3 text-right">
          <button class="text-blue-500 hover:text-blue-700 mr-2">Edit</button>
          <button class="text-red-500 hover:text-red-700">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
