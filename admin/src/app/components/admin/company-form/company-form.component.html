<div class="page-container max-w-5xl mx-auto">
  <div class="page-header flex justify-between items-center">
    <div>
      <h1 class="page-title">🏢 {{ isEditMode ? 'Edit Company' : 'Create New Company' }}</h1>
      <p class="page-subtitle">Configure company details and settings</p>
    </div>
    <button (click)="cancel()" class="btn-secondary py-1.5 px-3">
      ✕ Close
    </button>
  </div>

  <div class="bg-white/5 border border-white/10 rounded-xl p-6 md:p-8 shadow-2xl">
    <!-- Tabs -->
    <div class="flex border-b border-white/10 mb-6">
      <button (click)="activeTab = 'basic'" 
              [ngClass]="activeTab === 'basic' ? 'border-violet-500 text-violet-400' : 'border-transparent text-gray-400 hover:text-gray-200'" 
              class="px-4 py-2 border-b-2 font-medium transition focus:outline-none">
        Basic Info
      </button>
      <button (click)="activeTab = 'address'" 
              [ngClass]="activeTab === 'address' ? 'border-violet-500 text-violet-400' : 'border-transparent text-gray-400 hover:text-gray-200'" 
              class="px-4 py-2 border-b-2 font-medium transition focus:outline-none">
        Address
      </button>
      <button (click)="activeTab = 'payment'" 
              [ngClass]="activeTab === 'payment' ? 'border-violet-500 text-violet-400' : 'border-transparent text-gray-400 hover:text-gray-200'" 
              class="px-4 py-2 border-b-2 font-medium transition focus:outline-none">
        Payment Information
      </button>
    </div>

    <div class="min-h-[400px]">
      <!-- Basic Info Tab -->
      <div *ngIf="activeTab === 'basic'" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="space-y-4">
          <div class="form-group">
            <label>Company Name *</label>
            <input #companyNameModel="ngModel" [(ngModel)]="currentCompany.name" name="companyName" type="text" required class="form-input" placeholder="e.g. Super Shop">
            <app-required-error [control]="companyNameModel"></app-required-error>
          </div>
          <div class="form-group">
            <label>Subdomain *</label>
            <input #companySubdomainModel="ngModel" [(ngModel)]="currentCompany.subdomain" name="companySubdomain" type="text" required class="form-input" placeholder="e.g. shop">
            <app-required-error [control]="companySubdomainModel"></app-required-error>
          </div>
          <div class="form-group">
            <label>Company Email *</label>
            <input #companyEmailModel="ngModel" [(ngModel)]="currentCompany.contactEmail" name="companyEmail" type="email" required class="form-input" placeholder="admin@shop.com">
            <app-required-error [control]="companyEmailModel"></app-required-error>
          </div>
          <div class="form-group">
            <label>Company Logo (Upload)</label>
            <div class="mt-1 flex items-center space-x-4">
              <img *ngIf="currentCompany.logoUrl" [src]="currentCompany.logoUrl" class="h-24 w-auto object-contain rounded border border-white/10 p-1 bg-black/20">
              <input type="file" (change)="onLogoSelect($event)" accept="image/*" class="form-input py-1.5 text-xs">
            </div>
          </div>
        </div>
        <div class="space-y-4">
          <div class="form-group">
            <label>Company Mobile</label>
            <input [(ngModel)]="currentCompany.companyMobile" name="companyMobile" type="text" class="form-input" placeholder="01XXXXXXXXX">
          </div>
          <div class="form-group">
            <label>Owner Name</label>
            <input [(ngModel)]="currentCompany.ownerName" name="ownerName" type="text" class="form-input" placeholder="Owner Name">
          </div>
          <div class="form-group">
            <label>Owner Mobile</label>
            <input [(ngModel)]="currentCompany.ownerMobile" name="ownerMobile" type="text" class="form-input" placeholder="01XXXXXXXXX">
          </div>
          <div class="form-group">
            <label>Facebook Link</label>
            <input [(ngModel)]="currentCompany.facebookLink" name="facebookLink" type="text" class="form-input" placeholder="https://facebook.com/...">
          </div>
          <div class="form-group">
            <label>Instagram Link</label>
            <input [(ngModel)]="currentCompany.instagramLink" name="instagramLink" type="text" class="form-input" placeholder="https://instagram.com/...">
          </div>
          
          <div class="pt-4 border-t border-white/10">
            <label class="block text-sm font-semibold text-gray-400 mb-2">Account Status</label>
            <div class="flex items-center">
              <label class="flex items-center cursor-pointer">
                <div class="relative">
                  <input type="checkbox" class="sr-only" [(ngModel)]="currentCompany.isActive">
                  <div class="block w-10 h-6 rounded-full transition-colors" [ngClass]="currentCompany.isActive ? 'bg-emerald-500' : 'bg-gray-700'"></div>
                  <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform" [ngClass]="currentCompany.isActive ? 'transform translate-x-4' : ''"></div>
                </div>
                <span class="ml-3 text-sm font-medium" [ngClass]="currentCompany.isActive ? 'text-emerald-400' : 'text-gray-500'">
                  {{ currentCompany.isActive ? 'Active' : 'Inactive' }}
                </span>
              </label>
            </div>
          </div>
          
          <div class="form-group">
            <label>Approval Status</label>
            <select [(ngModel)]="currentCompany.approvalStatus" class="form-input font-medium"
                    [ngClass]="{'text-amber-400': currentCompany.approvalStatus === 'Pending', 'text-emerald-400': currentCompany.approvalStatus === 'Approved', 'text-rose-400': currentCompany.approvalStatus === 'Rejected'}">
              <option value="Pending">Pending</option>
              <option value="Approved">Approved</option>
              <option value="Rejected">Rejected</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Address Tab -->
      <div *ngIf="activeTab === 'address'" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="space-y-4">
          <div class="form-group">
            <label>Division</label>
            <select [(ngModel)]="currentCompany.division" name="division" (change)="onDivisionChange()" class="form-input">
              <option value="">Select Division</option>
              <option *ngFor="let div of divisions" [value]="div">{{ div }}</option>
            </select>
          </div>
          <div class="form-group">
            <label>District</label>
            <select [(ngModel)]="currentCompany.district" name="district" (change)="onDistrictChange()" class="form-input" [disabled]="!currentCompany.division">
              <option value="">Select District</option>
              <option *ngFor="let dist of availableDistricts" [value]="dist">{{ dist }}</option>
            </select>
          </div>
          <div class="form-group">
            <label>Thana / Upazila</label>
            <select [(ngModel)]="currentCompany.thana" name="thana" class="form-input" [disabled]="!currentCompany.district">
              <option value="">Select Thana</option>
              <option *ngFor="let th of availableThanas" [value]="th">{{ th }}</option>
            </select>
          </div>
        </div>
        <div class="space-y-4">
          <div class="form-group">
            <label>Detailed Address</label>
            <textarea [(ngModel)]="currentCompany.address" name="address" rows="5" class="form-input" placeholder="House no, Road no, Area..."></textarea>
          </div>
        </div>
      </div>

      <!-- Payment Information Tab -->
      <div *ngIf="activeTab === 'payment'" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="space-y-4">
          <h4 class="font-bold text-violet-400 mb-2 border-b border-white/10 pb-1">Mobile Banking</h4>
          <div class="form-group">
            <label>bKash Number</label>
            <input [(ngModel)]="currentCompany.bkashNumber" name="bkashNumber" type="text" class="form-input" placeholder="01XXXXXXXXX">
          </div>
          <div class="form-group">
            <label>Nagad Number</label>
            <input [(ngModel)]="currentCompany.nagadNumber" name="nagadNumber" type="text" class="form-input" placeholder="01XXXXXXXXX">
          </div>
        </div>
        <div class="space-y-4">
          <h4 class="font-bold text-violet-400 mb-2 border-b border-white/10 pb-1">Bank Account</h4>
          <div class="form-group">
            <label>Bank Name</label>
            <input [(ngModel)]="currentCompany.bankName" name="bankName" type="text" class="form-input" placeholder="e.g. City Bank">
          </div>
        </div>
      </div>
    </div>

    <div class="mt-8 border-t border-white/10 pt-6 flex justify-end space-x-3">
      <button (click)="cancel()" class="btn-secondary">Cancel</button>
      <button (click)="saveCompany()" class="btn-primary">Save Details</button>
    </div>
  </div>
</div>
