<div class="bg-white p-6 rounded-lg shadow-md max-w-5xl mx-auto">
  <div class="flex justify-between items-center mb-6 border-b pb-4">
    <h3 class="text-2xl font-bold text-gray-800">{{ isEditMode ? 'Edit Company' : 'Create New Company' }}</h3>
    <button (click)="cancel()" class="text-gray-500 hover:text-gray-700">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>
  </div>
  
  <!-- Tabs -->
  <div class="flex border-b mb-6">
    <button (click)="activeTab = 'basic'" [ngClass]="activeTab === 'basic' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'" class="px-4 py-2 border-b-2 font-medium transition">
      Basic Info
    </button>
    <button (click)="activeTab = 'address'" [ngClass]="activeTab === 'address' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'" class="px-4 py-2 border-b-2 font-medium transition">
      Address
    </button>
    <button (click)="activeTab = 'payment'" [ngClass]="activeTab === 'payment' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'" class="px-4 py-2 border-b-2 font-medium transition">
      Payment Information
    </button>
  </div>

  <div class="min-h-[400px]">
    <!-- Basic Info Tab -->
    <div *ngIf="activeTab === 'basic'" class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Company Name *</label>
          <input [(ngModel)]="currentCompany.name" type="text" class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-blue-500" placeholder="e.g. Super Shop">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Subdomain *</label>
          <input [(ngModel)]="currentCompany.subdomain" type="text" class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-blue-500" placeholder="e.g. shop">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Company Email *</label>
          <input [(ngModel)]="currentCompany.contactEmail" type="email" class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-blue-500" placeholder="admin@shop.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Company Logo (Upload)</label>
          <div class="mt-1 flex items-center space-x-4">
            <img *ngIf="currentCompany.logoUrl" [src]="currentCompany.logoUrl" class="h-24 w-auto object-contain rounded border border-gray-200">
            <input type="file" (change)="onLogoSelect($event)" accept="image/*" class="w-full p-1 border rounded text-sm focus:ring-2 focus:ring-blue-500">
          </div>
        </div>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Company Mobile</label>
          <input [(ngModel)]="currentCompany.companyMobile" type="text" class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-blue-500" placeholder="01XXXXXXXXX">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Owner Name</label>
          <input [(ngModel)]="currentCompany.ownerName" type="text" class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-blue-500" placeholder="Owner Name">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Owner Mobile</label>
          <input [(ngModel)]="currentCompany.ownerMobile" type="text" class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-blue-500" placeholder="01XXXXXXXXX">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Facebook Link</label>
          <input [(ngModel)]="currentCompany.facebookLink" type="text" class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-blue-500" placeholder="https://facebook.com/...">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Instagram Link</label>
          <input [(ngModel)]="currentCompany.instagramLink" type="text" class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-blue-500" placeholder="https://instagram.com/...">
        </div>
        
        <div class="pt-4 border-t border-gray-100">
          <label class="block text-sm font-medium text-gray-700 mb-2">Account Status</label>
          <div class="flex items-center space-x-6">
            <label class="flex items-center cursor-pointer">
              <div class="relative">
                <input type="checkbox" class="sr-only" [(ngModel)]="currentCompany.isActive">
                <div class="block w-10 h-6 rounded-full transition-colors" [ngClass]="currentCompany.isActive ? 'bg-green-500' : 'bg-gray-300'"></div>
                <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform" [ngClass]="currentCompany.isActive ? 'transform translate-x-4' : ''"></div>
              </div>
              <span class="ml-3 text-sm font-medium" [ngClass]="currentCompany.isActive ? 'text-green-600' : 'text-gray-500'">
                {{ currentCompany.isActive ? 'Active' : 'Inactive' }}
              </span>
            </label>
          </div>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Approval Status</label>
          <select [(ngModel)]="currentCompany.approvalStatus" class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 font-medium"
                  [ngClass]="{'text-yellow-600': currentCompany.approvalStatus === 'Pending', 'text-green-600': currentCompany.approvalStatus === 'Approved', 'text-red-600': currentCompany.approvalStatus === 'Rejected'}">
            <option value="Pending">Pending</option>
            <option value="Approved">Approved</option>
            <option value="Rejected">Rejected</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Address Tab -->
    <div *ngIf="activeTab === 'address'" class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Division</label>
          <select [(ngModel)]="currentCompany.division" (change)="onDivisionChange()" class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-blue-500">
            <option value="">Select Division</option>
            <option *ngFor="let div of divisions" [value]="div">{{ div }}</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">District</label>
          <select [(ngModel)]="currentCompany.district" (change)="onDistrictChange()" class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-blue-500" [disabled]="!currentCompany.division">
            <option value="">Select District</option>
            <option *ngFor="let dist of availableDistricts" [value]="dist">{{ dist }}</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Thana / Upazila</label>
          <select [(ngModel)]="currentCompany.thana" class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-blue-500" [disabled]="!currentCompany.district">
            <option value="">Select Thana</option>
            <option *ngFor="let th of availableThanas" [value]="th">{{ th }}</option>
          </select>
        </div>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Detailed Address</label>
          <textarea [(ngModel)]="currentCompany.address" rows="5" class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-blue-500" placeholder="House no, Road no, Area..."></textarea>
        </div>
      </div>
    </div>

    <!-- Payment Information Tab -->
    <div *ngIf="activeTab === 'payment'" class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="space-y-4">
        <h4 class="font-bold text-gray-700 mb-2 border-b pb-1">Mobile Banking</h4>
        <div>
          <label class="block text-sm font-medium text-gray-700">bKash Number</label>
          <input [(ngModel)]="currentCompany.bkashNumber" type="text" class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-blue-500" placeholder="01XXXXXXXXX">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Nagad Number</label>
          <input [(ngModel)]="currentCompany.nagadNumber" type="text" class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-blue-500" placeholder="01XXXXXXXXX">
        </div>
      </div>
      <div class="space-y-4">
        <h4 class="font-bold text-gray-700 mb-2 border-b pb-1">Bank Account</h4>
        <div>
          <label class="block text-sm font-medium text-gray-700">Bank Name</label>
          <input [(ngModel)]="currentCompany.bankName" type="text" class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-blue-500" placeholder="e.g. City Bank">
        </div>
      </div>
    </div>
  </div>

  <div class="mt-6 border-t pt-4 flex justify-end space-x-3 bg-gray-50 -mx-6 -mb-6 p-4 rounded-b-lg">
    <button (click)="cancel()" class="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded transition font-medium">Cancel</button>
    <button (click)="saveCompany()" class="px-6 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition shadow font-medium">Save Details</button>
  </div>
</div>
