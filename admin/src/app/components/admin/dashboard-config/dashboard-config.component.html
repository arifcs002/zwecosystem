<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">⚙️ Store Configuration</h1>
      <p class="page-subtitle">Manage branding and social settings</p>
    </div>
  </div>

  <div class="bg-white/5 p-6 rounded-xl border border-white/10 max-w-3xl">
    <form class="space-y-6">
      <!-- Basic Info -->
      <div>
        <h4 class="font-semibold text-lg text-violet-400 mb-4">Basic Information</h4>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="form-group">
            <label>Store Name</label>
            <input type="text" value="Demo Fashion Shop" class="form-input">
          </div>
          <div class="form-group">
            <label>Contact Number</label>
            <input type="text" value="+8801700000000" class="form-input">
          </div>
        </div>
      </div>

      <!-- Theme Settings -->
      <div class="border-t border-white/10 pt-6">
        <h4 class="font-semibold text-lg text-violet-400 mb-4">Theme & Branding</h4>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="form-group">
            <label>Primary Color (Hex)</label>
            <div class="flex items-center mt-1">
              <input type="color" value="#7c3aed" class="h-10 w-10 border border-white/10 rounded cursor-pointer bg-[#0d0d1a]">
              <input type="text" value="#7c3aed" class="ml-2 form-input font-mono">
            </div>
          </div>
          <div class="form-group">
            <label>Store Logo URL</label>
            <input type="text" placeholder="https://example.com/logo.png" class="form-input">
          </div>
        </div>
      </div>

      <!-- Social Links -->
      <div class="border-t border-white/10 pt-6">
        <h4 class="font-semibold text-lg text-violet-400 mb-4">Social Media Links</h4>
        <div class="space-y-3">
          <div class="flex items-center">
            <span class="bg-white/5 p-2 px-4 border border-white/10 border-r-0 rounded-l text-gray-400 text-sm font-medium">Facebook</span>
            <input type="text" placeholder="https://facebook.com/yourshop" class="flex-1 form-input rounded-l-none">
          </div>
          <div class="flex items-center">
            <span class="bg-white/5 p-2 px-4 border border-white/10 border-r-0 rounded-l text-gray-400 text-sm font-medium">Instagram</span>
            <input type="text" placeholder="https://instagram.com/yourshop" class="flex-1 form-input rounded-l-none">
          </div>
        </div>
      </div>

      <div class="border-t border-white/10 pt-6 flex justify-end">
        <button type="button" class="btn-primary">
          Save Settings
        </button>
      </div>
    </form>
  </div>
</div>
