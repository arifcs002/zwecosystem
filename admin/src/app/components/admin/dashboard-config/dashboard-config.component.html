<div class="bg-white p-6 rounded-lg shadow-md max-w-3xl">
  <h3 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4">Store Configuration</h3>

  <form class="space-y-6">
    <!-- Basic Info -->
    <div>
      <h4 class="font-semibold text-lg text-gray-700 mb-4">Basic Information</h4>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Store Name</label>
          <input type="text" value="Demo Fashion Shop" class="mt-1 block w-full border rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Contact Number</label>
          <input type="text" value="+8801700000000" class="mt-1 block w-full border rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
      </div>
    </div>

    <!-- Theme Settings -->
    <div class="border-t pt-6">
      <h4 class="font-semibold text-lg text-gray-700 mb-4">Theme & Branding</h4>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Primary Color (Hex)</label>
          <div class="flex items-center mt-1">
            <input type="color" value="#2563EB" class="h-10 w-10 border-none rounded">
            <input type="text" value="#2563EB" class="ml-2 block w-full border rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500 font-mono">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Store Logo URL</label>
          <input type="text" placeholder="https://example.com/logo.png" class="mt-1 block w-full border rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
      </div>
    </div>

    <!-- Social Links -->
    <div class="border-t pt-6">
      <h4 class="font-semibold text-lg text-gray-700 mb-4">Social Media Links</h4>
      <div class="space-y-3">
        <div class="flex items-center">
          <span class="bg-gray-100 p-2 border border-r-0 rounded-l text-gray-600">Facebook</span>
          <input type="text" placeholder="https://facebook.com/yourshop" class="flex-1 border rounded-r p-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <div class="flex items-center">
          <span class="bg-gray-100 p-2 border border-r-0 rounded-l text-gray-600">Instagram</span>
          <input type="text" placeholder="https://instagram.com/yourshop" class="flex-1 border rounded-r p-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
      </div>
    </div>

    <div class="border-t pt-6 flex justify-end">
      <button type="button" class="bg-blue-600 text-white px-6 py-2 rounded shadow hover:bg-blue-700 transition">
        Save Settings
      </button>
    </div>
  </form>
</div>
