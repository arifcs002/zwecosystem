<div class="page-container">
  <div class="page-header mb-6">
    <h1 class="page-title">➕ Add Products</h1>
    <p class="page-subtitle">Pick a supplier &amp; category once, then add as many products as you like — saved together.</p>
  </div>

  <!-- Shared: supplier + category -->
  <div class="shared-card">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="form-group">
        <label>Supplier <span class="req">*</span></label>
        <select [(ngModel)]="supplierId" name="supplierId" class="form-input">
          <option [ngValue]="undefined">— Select supplier —</option>
          <option *ngFor="let s of suppliers" [ngValue]="s.id">{{ s.name }}</option>
        </select>
      </div>
      <div class="form-group">
        <label>Category <span class="req">*</span> <span class="hint">(pick the deepest category — products save there)</span></label>
        <select [(ngModel)]="categoryId" name="categoryId" (ngModelChange)="onCategoryChange()" class="form-input">
          <option [ngValue]="undefined">— Select category —</option>
          <option *ngFor="let c of categoryOptions" [ngValue]="c.cat.id">{{ '— '.repeat(c.depth) }}{{ c.cat.name }}</option>
        </select>
      </div>
    </div>
    <p *ngIf="categoryId && availableSizes.length === 0" class="hint mt-2">This category has no sizes — each product is a single stock item.</p>
    <p *ngIf="availableSizes.length" class="hint mt-2">Sizes for this category: {{ availableSizes.join(', ') }}</p>
  </div>

  <!-- Product lines -->
  <div class="line-card" *ngFor="let line of lines; let i = index">
    <div class="line-head">
      <span class="line-no">Product {{ i + 1 }}</span>
      <button *ngIf="lines.length > 1" class="line-del" (click)="removeLine(i)" title="Remove">✕</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="form-group md:col-span-2">
        <label>Product Name <span class="req">*</span></label>
        <input [(ngModel)]="line.name" [name]="'name'+i" class="form-input" placeholder="e.g. Cotton T-Shirt">
      </div>
      <div class="form-group">
        <label>Image</label>
        <div class="img-row">
          <img *ngIf="line.imagePreview" [src]="line.imagePreview" class="img-prev">
          <input type="file" accept="image/*" (change)="onImageSelected($event, line)">
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
      <div class="form-group">
        <label>Buy Price (BDT)</label>
        <input type="number" [(ngModel)]="line.wholesalePrice" [name]="'ws'+i" (ngModelChange)="applyPricingTag(line)" class="form-input">
      </div>
      <div class="form-group">
        <label>Pricing Tag <span class="hint">(auto price)</span></label>
        <select [(ngModel)]="line.pricingTagId" [name]="'tag'+i" (ngModelChange)="applyPricingTag(line)" class="form-input">
          <option [ngValue]="null">— Manual —</option>
          <option *ngFor="let t of pricingTags" [ngValue]="t.id">{{ t.name }} (+{{ t.profitPercent }}%)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Sell Price (BDT)</label>
        <input type="number" [(ngModel)]="line.price" [name]="'price'+i" class="form-input">
      </div>
      <div class="form-group">
        <label>Compare-at <span class="hint">(optional)</span></label>
        <input type="number" [(ngModel)]="line.compareAtPrice" [name]="'cmp'+i" class="form-input" placeholder="was price">
      </div>
    </div>

    <!-- Sizes -->
    <div class="form-group" *ngIf="availableSizes.length">
      <label>Quantity per size <span class="hint">(total: {{ lineQty(line) }})</span></label>
      <div class="size-grid">
        <div class="size-cell" *ngFor="let sz of availableSizes">
          <span class="size-lbl">{{ sz }}</span>
          <input type="number" min="0" [(ngModel)]="line.sizeQuantities[sz]" [name]="'sz'+i+sz" class="size-inp" placeholder="0">
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea [(ngModel)]="line.description" [name]="'desc'+i" rows="2" class="form-input resize-none" placeholder="Optional"></textarea>
    </div>
  </div>

  <!-- Add another -->
  <button class="add-line" (click)="addLine()">+ Add Another Product</button>

  <!-- Submit -->
  <div class="submit-row">
    <button class="btn-primary submit-btn" (click)="onSubmit()" [disabled]="isSubmitting">
      {{ isSubmitting ? 'Saving…' : 'Save ' + lines.length + ' Product' + (lines.length > 1 ? 's' : '') }}
    </button>
  </div>
</div>
