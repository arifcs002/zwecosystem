<div class="page-container max-w-4xl mx-auto">
  <div class="page-header">
    <div>
      <h1 class="page-title">👟 Add Shoe Inventory</h1>
      <p class="page-subtitle">Add new shoe styles and stock levels</p>
    </div>
  </div>

  <div class="bg-white/5 border border-white/10 rounded-xl p-6 md:p-8 shadow-2xl">
    <form (ngSubmit)="onSubmit()" class="space-y-6">
      
      <!-- Top Row -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="form-group">
          <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Supplier</label>
          <select [(ngModel)]="formData.supplierId" name="supplierId" class="form-input">
            <option value="">-- Select Supplier --</option>
            <option *ngFor="let s of suppliers" [value]="s.id">{{ s.name }}</option>
          </select>
        </div>
        <div class="form-group">
          <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Category</label>
          <select [(ngModel)]="formData.categoryId" (change)="onCategoryChange()" name="categoryId" class="form-input">
            <option value="">-- Select Category --</option>
            <option *ngFor="let c of categories" [value]="c.id">{{ c.name }}</option>
          </select>
        </div>
      </div>

      <!-- Name -->
      <div class="form-group">
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Shoe Brand Model / Name</label>
        <input type="text" [(ngModel)]="formData.name" name="name" placeholder="e.g. Apex Jogger v3" class="form-input">
      </div>

      <!-- Pricing -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="form-group">
          <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Retail Price (BDT)</label>
          <input type="number" [(ngModel)]="formData.price" name="price" class="form-input">
        </div>
        <div class="form-group">
          <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Wholesale Price (BDT)</label>
          <input type="number" [(ngModel)]="formData.wholesalePrice" name="wholesalePrice" class="form-input">
        </div>
      </div>

      <!-- Description -->
      <div class="form-group">
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Description</label>
        <textarea [(ngModel)]="formData.description" name="description" rows="3" placeholder="Model specifications, material details..." class="form-input"></textarea>
      </div>

      <!-- Bottom Row: Photo & Sizes -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8 border-t border-white/10 pt-6">
        
        <!-- Photo Upload -->
        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Sample Photo</label>
          <div class="border-2 border-dashed border-white/20 rounded-xl bg-black/20 h-48 flex flex-col items-center justify-center relative overflow-hidden group hover:border-violet-500 transition">
            
            <ng-container *ngIf="!imagePreview">
              <i class="fas fa-camera text-3xl text-gray-600 mb-2 group-hover:text-violet-400 transition"></i>
              <span class="text-sm text-gray-500 font-medium group-hover:text-violet-400 transition">Upload Image</span>
            </ng-container>

            <img *ngIf="imagePreview" [src]="imagePreview" class="absolute inset-0 w-full h-full object-cover">

            <input type="file" (change)="onImageSelected($event)" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full">
          </div>
          <div class="flex justify-center space-x-2 mt-4">
            <button type="button" class="btn-secondary py-1.5 px-4 text-xs">Gallery</button>
            <button type="button" class="btn-primary py-1.5 px-4 text-xs">Camera</button>
          </div>
        </div>

        <!-- Sizes Config -->
        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Sizes & Quantities</label>
          <div class="border border-white/10 rounded-xl bg-black/20 p-4 min-h-[12rem] flex flex-col justify-center">
            
            <div *ngIf="!selectedCategoryObj" class="text-sm text-gray-500 text-center">
              Select a category to configure sizes.
            </div>

            <div *ngIf="selectedCategoryObj && availableSizes.length === 0" class="text-sm text-gray-500 text-center">
              This category has no predefined sizes.<br>Cannot map variations.
            </div>

            <div *ngIf="selectedCategoryObj && availableSizes.length > 0" class="space-y-3 max-h-48 overflow-y-auto pr-2">
              <div *ngFor="let size of availableSizes" class="flex items-center justify-between bg-white/5 p-2 rounded border border-white/5 shadow-sm">
                <span class="font-bold text-gray-300 w-16 text-center">Size {{ size }}</span>
                <div class="flex items-center space-x-2">
                  <span class="text-xs text-gray-500">Qty</span>
                  <input type="number" [(ngModel)]="sizeQuantities[size]" [name]="'qty_'+size" class="w-24 p-1.5 text-center bg-[#0d0d1a] border border-white/10 rounded text-white focus:outline-none focus:border-violet-500 text-sm font-bold">
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="pt-6 border-t border-white/10 flex justify-end space-x-3">
        <button type="button" class="btn-secondary">Cancel</button>
        <button type="submit" [disabled]="isSubmitting" class="btn-primary flex items-center gap-2">
          <i *ngIf="isSubmitting" class="fas fa-spinner fa-spin"></i>
          Save Inventory
        </button>
      </div>

    </form>
  </div>
</div>
