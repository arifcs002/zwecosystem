version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: zwecosystem-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: zwecodb
      POSTGRES_USER: zw_user
      POSTGRES_PASSWORD: A3w%$Labu!!Mh#896
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - zwecosystem-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zwecosystem-api
    ports:
      - "5500:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=zwecodb;Username=zw_user;Password=A3w%$Labu!!Mh#896;Include Error Detail=true;
      - Jwt__Secret=zw-ecosystem-super-secret-key-2026-change-in-prod-must-be-32-chars-min
      - SmtpSettings__Host=smtp.gmail.com
      - SmtpSettings__Port=587
      - SmtpSettings__EnableSsl=true
      - SmtpSettings__Username=your-email@gmail.com
      - SmtpSettings__Password=your-app-password
      - SmtpSettings__FromAddress=noreply@zwecosystem.com
      - SmtpSettings__FromName=ZW Ecosystem
    depends_on:
      - postgres
    networks:
      - zwecosystem-network
    restart: unless-stopped

  admin-dashboard:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: zwecosystem-admin
    ports:
      - "85:80"
    depends_on:
      - backend
    networks:
      - zwecosystem-network
    restart: unless-stopped

volumes:
  pgdata:

networks:
  zwecosystem-network:
    driver: bridge
