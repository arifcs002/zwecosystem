version: '3.8'

# ================================================================
# ZW Ecosystem — Docker Compose
# Secrets are loaded from .env file (git-ignored).
# Copy .env.example to .env on the server and fill real values.
# ================================================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: zwecosystem-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - zwecosystem-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zwecosystem-api
    ports:
      - "5500:8080"
    environment:
      # These env vars are picked up by Program.cs (DB_CONNECTION_STRING, JWT_SECRET)
      - DB_CONNECTION_STRING=${DB_CONNECTION_STRING}
      - JWT_SECRET=${JWT_SECRET}
      # SMTP (optional)
      - SmtpSettings__Host=${SMTP_HOST:-smtp.gmail.com}
      - SmtpSettings__Port=${SMTP_PORT:-587}
      - SmtpSettings__EnableSsl=true
      - SmtpSettings__Username=${SMTP_USERNAME}
      - SmtpSettings__Password=${SMTP_PASSWORD}
      - SmtpSettings__FromAddress=${SMTP_FROM:-noreply@zwecosystem.com}
      - SmtpSettings__FromName=ZW Ecosystem
      - ASPNETCORE_ENVIRONMENT=Production
    volumes:
      - /data/apps/textlog:/data/apps/textlog
      - /data/apps/zwecosystem/upload:/app/wwwroot/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zwecosystem-network
    restart: unless-stopped

  admin-dashboard:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: zwecosystem-admin
    ports:
      - "85:80"
    depends_on:
      - backend
    networks:
      - zwecosystem-network
    restart: unless-stopped

volumes:
  pgdata:

networks:
  zwecosystem-network:
    driver: bridge
