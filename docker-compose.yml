version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ecommerce-network

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    networks:
      - ecommerce-network

  minio:
    image: minio/minio:latest
    container_name: ecommerce-storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"
    volumes:
      - miniadata:/data
    networks:
      - ecommerce-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce-backend
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ecommerce_db;Username=dev_user;Password=A3w@A#Mh#896!S;Include Error Detail=true;
      - Redis__Configuration=redis:6379
      - Jwt__Secret=super-secret-key-change-in-prod-long-enough-32-chars
      - AwsS3__ServiceUrl=http://minio:9000
      - AwsS3__AccessKey=minioadmin
      - AwsS3__SecretKey=minioadminpassword
      - AwsS3__BucketName=ecommerce-media
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - ecommerce-network

  admin-dashboard:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: ecommerce-admin
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - ecommerce-network

volumes:
  pgdata:
  redisdata:
  miniadata:

networks:
  ecommerce-network:
    driver: bridge
