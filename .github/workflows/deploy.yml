name: ZW Ecosystem — Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy to Contabo VPS
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            # Set explicit PATH containing all standard binary locations
            export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH

            # Load user and system profiles
            [ -f /etc/profile ] && . /etc/profile
            [ -f ~/.profile ] && . ~/.profile
            [ -f ~/.bashrc ] && . ~/.bashrc

            echo "==> PATH is: $PATH"
            echo "==> Checking git location..."
            if ! which git >/dev/null 2>&1; then
              echo "==> Git is missing! Attempting to install git..."
              if which apt-get >/dev/null 2>&1; then
                echo "${{ secrets.SSH_PASSWORD }}" | sudo -S apt-get update -y
                echo "${{ secrets.SSH_PASSWORD }}" | sudo -S apt-get install -y git
              elif which yum >/dev/null 2>&1; then
                echo "${{ secrets.SSH_PASSWORD }}" | sudo -S yum install -y git
              else
                echo "No package manager found to install git!"
                exit 1
              fi
            fi

            which git || { echo "Git could not be installed!"; exit 1; }

            set -e
            echo "==> Ensuring deploy directory exists and has correct permissions..."
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S mkdir -p /data/apps/zwecosystem
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S chown -R $USER:$USER /data/apps/zwecosystem

            cd /data/apps/zwecosystem

            if [ ! -d .git ]; then
              echo "==> Directory is not a git repository. Initializing git..."
              git init
              git remote add origin https://github.com/arifcs002/zwecosystem.git
              git fetch origin main
              git checkout -f main || git checkout -b main
              git reset --hard origin/main
            else
              echo "==> Pulling latest code from GitHub..."
              git pull origin main
            fi

            echo "==> Stopping running containers..."
            docker compose down

            echo "==> Building and starting containers..."
            docker compose up -d --build

            echo "==> Cleaning up unused Docker images..."
            docker image prune -f

            echo "==> Deployment complete!"
            docker compose ps
