name: ZW Ecosystem — Deploy to Production

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ghcr.io/${{ github.repository }}/backend:latest
  IMAGE_NAME_FRONTEND: ghcr.io/${{ github.repository }}/admin-dashboard:latest

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚙️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🚀 Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME_BACKEND }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🚀 Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          file: ./admin/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME_FRONTEND }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Copy Config & Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📝 Prepare production docker-compose
        run: |
          cat << 'EOF' > docker-compose.prod.yml
          version: '3.8'

          services:
            postgres:
              image: postgres:15-alpine
              container_name: zwecosystem-postgres
              ports:
                - "5432:5432"
              environment:
                POSTGRES_DB: ${POSTGRES_DB}
                POSTGRES_USER: ${POSTGRES_USER}
                POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
              volumes:
                - pgdata:/var/lib/postgresql/data
              networks:
                - zwecosystem-network
              restart: unless-stopped
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
                interval: 10s
                timeout: 5s
                retries: 5

            backend:
              image: ghcr.io/${{ github.repository }}/backend:latest
              container_name: zwecosystem-api
              ports:
                - "5500:8080"
              environment:
                - DB_CONNECTION_STRING=${DB_CONNECTION_STRING}
                - JWT_SECRET=${JWT_SECRET}
                - SmtpSettings__Host=${SMTP_HOST}
                - SmtpSettings__Port=${SMTP_PORT}
                - SmtpSettings__EnableSsl=true
                - SmtpSettings__Username=${SMTP_USERNAME}
                - SmtpSettings__Password=${SMTP_PASSWORD}
                - SmtpSettings__FromAddress=${SMTP_FROM}
                - SmtpSettings__FromName=ZW Ecosystem
                - ASPNETCORE_ENVIRONMENT=Production
              depends_on:
                postgres:
                  condition: service_healthy
              networks:
                - zwecosystem-network
              restart: unless-stopped

            admin-dashboard:
              image: ghcr.io/${{ github.repository }}/admin-dashboard:latest
              container_name: zwecosystem-admin
              ports:
                - "85:80"
              depends_on:
                - backend
              networks:
                - zwecosystem-network
              restart: unless-stopped

          volumes:
            pgdata:

          networks:
            zwecosystem-network:
              driver: bridge
          EOF

      - name: 📁 Copy docker-compose to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "docker-compose.prod.yml"
          target: "/data/apps/zwecosystem/"

      - name: 🚀 Deploy Containers via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S mkdir -p /data/apps/zwecosystem
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S chown -R $USER:$USER /data/apps/zwecosystem

            cd /data/apps/zwecosystem

            # Move and overwrite the compose config
            mv -f docker-compose.prod.yml docker-compose.yml

            # Log in to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest pre-built images and restart containers
            docker compose pull
            docker compose down
            docker compose up -d

            # Clean up old images and source directories to keep only docker-compose and .env
            docker image prune -f
            rm -rf admin backend mobile schema.sql user_messages.txt README.md .git

            # Configure firewall to allow traffic only on port 85 (keep 5500 and 5432 blocked publicly)
            if command -v ufw >/dev/null 2>&1; then
              echo "Configuring UFW firewall..."
              echo "${{ secrets.SSH_PASSWORD }}" | sudo -S ufw allow 85/tcp
              echo "${{ secrets.SSH_PASSWORD }}" | sudo -S ufw deny 5500/tcp
              echo "${{ secrets.SSH_PASSWORD }}" | sudo -S ufw deny 5432/tcp
              echo "${{ secrets.SSH_PASSWORD }}" | sudo -S ufw reload
            elif command -v firewall-cmd >/dev/null 2>&1; then
              echo "Configuring Firewalld..."
              echo "${{ secrets.SSH_PASSWORD }}" | sudo -S firewall-cmd --permanent --zone=public --add-port=85/tcp
              echo "${{ secrets.SSH_PASSWORD }}" | sudo -S firewall-cmd --permanent --zone=public --remove-port=5500/tcp --permanent 2>/dev/null || true
              echo "${{ secrets.SSH_PASSWORD }}" | sudo -S firewall-cmd --permanent --zone=public --remove-port=5432/tcp --permanent 2>/dev/null || true
              echo "${{ secrets.SSH_PASSWORD }}" | sudo -S firewall-cmd --reload
            else
              echo "No ufw or firewalld command found. Relying on raw iptables rules..."
              echo "${{ secrets.SSH_PASSWORD }}" | sudo -S iptables -D INPUT -p tcp --dport 5500 -j ACCEPT 2>/dev/null || true
              echo "${{ secrets.SSH_PASSWORD }}" | sudo -S iptables -D INPUT -p tcp --dport 5432 -j ACCEPT 2>/dev/null || true
              echo "${{ secrets.SSH_PASSWORD }}" | sudo -S iptables -I INPUT -p tcp --dport 85 -j ACCEPT
            fi

            echo "==> Deployment complete!"
            docker compose ps

            echo "=== SYSTEM DIAGNOSTICS ==="
            echo "1. Host Firewall Status:"
            if command -v ufw >/dev/null 2>&1; then echo "${{ secrets.SSH_PASSWORD }}" | sudo -S ufw status verbose; fi
            if command -v firewall-cmd >/dev/null 2>&1; then echo "${{ secrets.SSH_PASSWORD }}" | sudo -S firewall-cmd --list-all; fi
            
            echo "2. Listening Ports on Host:"
            echo "${{ secrets.SSH_PASSWORD }}" | sudo -S ss -tulnp
            
            echo "3. Active Docker Containers:"
            docker ps -a
            
            echo "4. Local Host Nginx Configuration:"
            if [ -f /etc/nginx/nginx.conf ]; then cat /etc/nginx/nginx.conf; fi
            if [ -d /etc/nginx/conf.d ]; then ls -la /etc/nginx/conf.d/; fi
