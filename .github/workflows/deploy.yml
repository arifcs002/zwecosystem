name: ZW Ecosystem — Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy to Contabo VPS
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: 🚀 Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            echo "==> Navigating to deploy directory..."
            cd /data/apps/zwecosystem

            echo "==> Pulling latest code from GitHub..."
            git pull origin main

            echo "==> Stopping running containers..."
            docker compose down

            echo "==> Building and starting containers..."
            docker compose up -d --build

            echo "==> Cleaning up unused Docker images..."
            docker image prune -f

            echo "==> Deployment complete!"
            docker compose ps
          ENDSSH
