name: ZW Ecosystem — Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy to Contabo VPS
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            # Set explicit PATH containing all standard binary locations
            export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH

            # Load user and system profiles
            [ -f /etc/profile ] && . /etc/profile
            [ -f ~/.profile ] && . ~/.profile
            [ -f ~/.bashrc ] && . ~/.bashrc

            echo "==> PATH is: $PATH"
            echo "==> Checking git location..."
            which git || echo "git not found in PATH"

            set -e
            echo "==> Navigating to deploy directory..."
            cd /data/apps/zwecosystem

            echo "==> Pulling latest code from GitHub..."
            git pull origin main

            echo "==> Stopping running containers..."
            docker compose down

            echo "==> Building and starting containers..."
            docker compose up -d --build

            echo "==> Cleaning up unused Docker images..."
            docker image prune -f

            echo "==> Deployment complete!"
            docker compose ps
