name: Build & Publish APK

# Triggers:
#   1. Manual run — provide version name/code explicitly
#   2. Auto — every push to main that touches admin/ source code
#      (version is auto-incremented using the GitHub run number)
on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name  (e.g. 1.2.0)'
        required: true
        default: '1.0.0'
      version_code:
        description: 'Version code  (integer, must be higher than previous)'
        required: true
        default: '1'
      release_notes:
        description: 'Release notes (optional)'
        required: false
        default: ''

  push:
    branches: [main]
    paths:
      - 'admin/src/**'
      - 'admin/capacitor.config.ts'
      - 'admin/android/app/src/**'

env:
  API_BASE: ${{ secrets.API_BASE_URL }}   # e.g. http://194.5.152.74:5500

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Toolchain ───────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          build-tools: '33.0.2'

      # ── 3. Determine version ───────────────────────────────────────────────
      - name: Resolve version info
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.version_name }}" >> $GITHUB_OUTPUT
            echo "code=${{ github.event.inputs.version_code }}" >> $GITHUB_OUTPUT
            echo "notes=${{ github.event.inputs.release_notes }}" >> $GITHUB_OUTPUT
          else
            # Auto-build: version = 1.0.<run_number>, code = run_number
            RUN="${{ github.run_number }}"
            SHORT_SHA="${GITHUB_SHA::7}"
            echo "name=1.0.${RUN}" >> $GITHUB_OUTPUT
            echo "code=${RUN}" >> $GITHUB_OUTPUT
            echo "notes=Auto-build from commit ${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      # ── 4. Angular build ───────────────────────────────────────────────────
      - name: Install npm dependencies
        working-directory: admin
        run: npm ci

      - name: Build Angular (production)
        working-directory: admin
        run: npx ng build --configuration production

      # ── 5. Capacitor sync ──────────────────────────────────────────────────
      - name: Capacitor sync
        working-directory: admin
        run: npx cap sync android

      # ── 6. Gradle build ────────────────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: admin/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: admin/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Locate APK
        id: apk
        run: |
          APK=$(find admin/android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "Built APK: $APK ($SIZE)"

      # ── 7. Upload APK to production backend ────────────────────────────────
      - name: Login to API
        id: auth
        run: |
          RESP=$(curl -s -X POST "${{ env.API_BASE }}/api/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"${{ secrets.CI_EMAIL }}\",\"password\":\"${{ secrets.CI_PASSWORD }}\",\"loginContext\":null}")
          TOKEN=$(echo "$RESP" | jq -r '.token // empty')
          if [ -z "$TOKEN" ]; then
            echo "Login failed. Response: $RESP"
            exit 1
          fi
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          echo "Login OK"

      - name: Publish APK to backend
        run: |
          RESP=$(curl -s -w "\n%{http_code}" -X POST "${{ env.API_BASE }}/api/appversions" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -F "file=@${{ steps.apk.outputs.path }}" \
            -F "versionName=${{ steps.ver.outputs.name }}" \
            -F "versionCode=${{ steps.ver.outputs.code }}" \
            -F "releaseNotes=${{ steps.ver.outputs.notes }}")
          HTTP_CODE=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | head -n -1)
          echo "HTTP $HTTP_CODE — $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Upload failed!"
            exit 1
          fi
          echo "Published: version ${{ steps.ver.outputs.name }} (code ${{ steps.ver.outputs.code }})"

      # ── 8. Upload artifact (optional — keeps APK in GitHub for 7 days) ────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ steps.ver.outputs.name }}-${{ steps.ver.outputs.code }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 7
